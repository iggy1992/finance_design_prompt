<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>금융 콘텐츠 프롬프트 빌더</title>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --main: #5a0ad2;
      --main-light: rgba(90,10,210,0.15);
      --grad1: #8081ff;
      --grad2: #8CC0FF;
      --bg: #f7f7fb;
      --sidebar-bg: #1a0a3a;
      --surface: #ffffff;
      --border: #e8e8f0;
      --text: #1a1a2e;
      --muted: #888899;
      --chip-bg: #f0eeff;
      --chip-border: #ddd8f8;
      --chip-active-bg: #5a0ad2;
      --chip-active-text: #ffffff;
    }
    body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* TOP NAV */
    .topnav {
      display: flex; align-items: center; gap: 12px;
      background: var(--sidebar-bg); padding: 0 24px; height: 52px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      position: sticky; top: 0; z-index: 100;
    }
    .logo-mark { width: 28px; height: 28px; background: var(--main); border-radius: 6px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:#fff; }
    .topnav-title { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.6); letter-spacing: 0.04em; }
    .topnav-back { margin-right: auto; display: none; }
    .tab-bar { display: flex; align-items: center; gap: 4px; margin-left: auto; }
    .tab-btn {
      font-size: 12px; font-weight: 600; padding: 5px 14px; border-radius: 6px;
      border: none; cursor: pointer; transition: all 0.2s; letter-spacing: 0.02em;
      background: transparent; color: rgba(255,255,255,0.4);
    }
    .tab-btn.active { background: rgba(128,129,255,0.2); color: #8081ff; }
    .tab-btn:hover:not(.active) { color: rgba(255,255,255,0.7); }

    /* LAYOUT */
    .layout { display: grid; grid-template-columns: 380px 1fr; min-height: calc(100vh - 52px); }

    /* LEFT PANEL */
    .panel {
      background: var(--surface); border-right: 1px solid var(--border);
      overflow-y: auto; max-height: calc(100vh - 52px);
      padding-bottom: 32px;
    }

    .panel-header { padding: 32px 24px 24px; }
    .panel-header h2 { font-size: 26px; font-weight: 700; line-height: 1.2; margin-bottom: 10px; }
    .panel-header h2 em { font-style: normal; color: var(--main); }
    .panel-header p { font-size: 13px; color: var(--muted); line-height: 1.6; }

    /* SECTIONS */
    .section { border-top: 1px solid var(--border); }
    .section-header {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 24px; cursor: pointer; user-select: none;
      transition: background 0.15s;
    }
    .section-header:hover { background: #fafafa; }
    .section-num { font-size: 11px; font-weight: 700; color: var(--muted); min-width: 20px; }
    .section-title { font-size: 13px; font-weight: 700; flex: 1; }
    .section-sub { font-size: 11px; color: var(--grad1); font-weight: 500; background: rgba(128,129,255,0.1); padding: 2px 7px; border-radius: 4px; }
    .section-badge { font-size: 10px; color: var(--muted); font-weight: 500; margin-left: auto; }
    .section-arrow { font-size: 12px; color: var(--muted); transition: transform 0.2s; }
    .section.open .section-arrow { transform: rotate(180deg); }
    .section-body { padding: 4px 24px 20px; display: none; }
    .section.open .section-body { display: block; }

    /* CATEGORY TABS */
    .cat-tabs { display: flex; gap: 8px; padding: 12px 0 4px; }
    .cat-tab {
      font-size: 13px; font-weight: 600; padding: 6px 16px;
      border-radius: 20px; border: none; cursor: pointer;
      transition: all 0.15s;
      background: var(--chip-bg); color: var(--main);
    }
    .cat-tab.active { background: var(--main); color: #fff; }

    /* GROUP */
    .group { margin-top: 16px; }
    .group-label { font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: 0.06em; margin-bottom: 8px; border-top: 1px solid var(--border); padding-top: 12px; }
    .chips { display: flex; flex-wrap: wrap; gap: 7px; }

    /* CHIP */
    .chip {
      font-size: 12px; font-weight: 500;
      padding: 6px 12px; border-radius: 20px;
      border: 1px solid var(--chip-border);
      background: var(--chip-bg); color: #444;
      cursor: pointer; transition: all 0.15s; line-height: 1.3;
    }
    .chip:hover { border-color: var(--grad1); color: var(--main); }
    .chip.selected { background: var(--main); border-color: var(--main); color: #fff; }

    /* CUSTOM INPUT */
    .custom-input-row { display: flex; gap: 8px; margin-top: 12px; }
    .custom-input {
      flex: 1; font-family: inherit; font-size: 13px;
      padding: 8px 12px; border: 1px solid var(--border);
      border-radius: 8px; background: #fafafa; color: var(--text);
      outline: none; transition: border-color 0.2s;
    }
    .custom-input:focus { border-color: var(--grad1); }
    .custom-input::placeholder { color: var(--muted); }
    .add-btn {
      font-family: inherit; font-size: 13px; font-weight: 600;
      padding: 8px 16px; border-radius: 8px;
      border: none; background: var(--main); color: #fff;
      cursor: pointer; transition: opacity 0.15s; white-space: nowrap;
    }
    .add-btn:hover { opacity: 0.85; }

    /* EXCLUDE (multi select) */
    .exclude-note { font-size: 11px; color: var(--muted); margin-bottom: 8px; }

    /* RESET */
    .reset-btn {
      display: block; width: 100%; margin: 20px 24px 0;
      width: calc(100% - 48px);
      font-family: inherit; font-size: 12px; font-weight: 600;
      padding: 10px; border-radius: 8px;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); cursor: pointer; transition: all 0.15s;
    }
    .reset-btn:hover { border-color: var(--main); color: var(--main); }

    /* RIGHT PANEL */
    .result-area {
      padding: 40px 40px 40px;
      display: flex; flex-direction: column; gap: 24px;
      overflow-y: auto; max-height: calc(100vh - 52px);
    }

    .result-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden;
    }
    .result-box-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid var(--border);
    }
    .result-box-title { font-size: 13px; font-weight: 700; }
    .result-box-actions { display: flex; gap: 8px; }
    .action-btn {
      font-family: inherit; font-size: 12px; font-weight: 600;
      padding: 6px 14px; border-radius: 8px; border: none; cursor: pointer;
      transition: all 0.15s;
    }
    .action-btn.secondary { background: #f0eeff; color: var(--main); }
    .action-btn.secondary:hover { background: #e4d9ff; }
    .action-btn.primary { background: var(--main); color: #fff; }
    .action-btn.primary:hover { opacity: 0.85; }

    .prompt-textarea {
      width: 100%; min-height: 160px; font-family: inherit;
      font-size: 14px; line-height: 1.7; color: var(--text);
      padding: 20px; border: none; outline: none; resize: vertical;
      background: transparent;
    }

    .custom-add-row { display: flex; gap: 8px; padding: 0 20px 16px; }
    .custom-add-input {
      flex: 1; font-family: inherit; font-size: 13px;
      padding: 8px 12px; border: 1px solid var(--border);
      border-radius: 8px; background: #fafafa; color: var(--text);
      outline: none; transition: border-color 0.2s;
    }
    .custom-add-input:focus { border-color: var(--grad1); }
    .custom-add-input::placeholder { color: var(--muted); }
    .separator { color: var(--muted); font-size: 13px; padding: 0 4px; display:flex; align-items:center; }

    /* HISTORY */
    .history-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden;
    }
    .history-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid var(--border);
    }
    .history-title { font-size: 13px; font-weight: 700; }
    .history-actions { display: flex; gap: 8px; }
    .history-list { padding: 8px 0; min-height: 60px; }
    .history-empty { font-size: 13px; color: var(--muted); padding: 20px; text-align: center; }
    .history-item {
      padding: 12px 20px; cursor: pointer; transition: background 0.15s;
      border-bottom: 1px solid var(--border); font-size: 13px;
      color: var(--text); line-height: 1.5;
    }
    .history-item:last-child { border-bottom: none; }
    .history-item:hover { background: #fafafa; }
    .history-item-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--muted); font-size: 12px; margin-top: 2px; }

    /* COPY TOAST */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: #1a1a2e; color: #fff; font-size: 13px; font-weight: 600;
      padding: 10px 20px; border-radius: 8px; opacity: 0;
      transition: all 0.3s; pointer-events: none; z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }
      .result-area { display: none; }
      .panel { max-height: none; border-right: none; }
    }
  </style>
</head>
<body>

<nav class="topnav">
  <span class="topnav-title">Prompt Builder</span>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('object')">오브제 그래픽</button>
    <button class="tab-btn" onclick="switchTab('scene')">상황 묘사</button>
  </div>
</nav>

<div class="layout">
  <!-- LEFT PANEL -->
  <div class="panel" id="leftPanel">
    <div class="panel-header">
      <h2 id="panelTitle">블록을 고르면<br><em>문장이 완성됩니다.</em></h2>
      <p id="panelDesc">항목을 클릭해 펼치고, 원하는 표현을 선택하세요. 오른쪽에 프롬프트가 실시간으로 조립됩니다.</p>
    </div>
    <div id="sectionsContainer"></div>
    <button class="reset-btn" onclick="resetAll()">전체 초기화</button>
  </div>

  <!-- RIGHT PANEL -->
  <div class="result-area">
    <div class="result-box">
      <div class="result-box-header">
        <span class="result-box-title">완성된 프롬프트</span>
        <div class="result-box-actions">
          <div class="custom-add-row" style="padding:0; gap:6px;">
            <input class="custom-add-input" id="directInput" placeholder="직접 추가" style="width:160px;">
            <span class="separator">—</span>
          </div>
          <button class="action-btn secondary" onclick="savePrompt()">저장</button>
          <button class="action-btn primary" onclick="copyPrompt()">복사하기</button>
        </div>
      </div>
      <textarea class="prompt-textarea" id="promptOutput" placeholder="블록 선택이 자동으로 반영됩니다" readonly></textarea>
    </div>

    <div class="history-box">
      <div class="history-header">
        <span class="history-title">저장된 프롬프트</span>
        <div class="history-actions">
          <button class="action-btn secondary" onclick="exportHistory()">히스토리 내보내기</button>
          <button class="action-btn secondary" onclick="importHistory()">가져오기</button>
        </div>
      </div>
      <div class="history-list" id="historyList">
        <div class="history-empty">저장된 프롬프트가 없습니다.</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast">복사되었습니다!</div>

// ─── STATE ──────────────────────────────────────────────────────────────────

let currentTab = 'object';
let currentCategory = '대출';
let selections = {};
let history = JSON.parse(localStorage.getItem('promptHistory') || '[]');

// ─── RENDER ─────────────────────────────────────────────────────────────────

function getCurrentData() { return currentTab === 'object' ? OBJECT_DATA : SCENE_DATA; }

function renderSections() {
  const data = getCurrentData();
  const container = document.getElementById('sectionsContainer');
  container.innerHTML = '';

  const sectionKeys = currentTab === 'object'
    ? ['category', 'message', 'object', 'shape', 'composition', 'light', 'surface', 'color', 'background', 'exclude']
    : ['category', 'message', 'background', 'keyElement', 'timeofday', 'lighting', 'colorMood', 'camera', 'mood', 'exclude'];

  sectionKeys.forEach((key, i) => {
    const isOpen = i === 0 || (i === 1 && true);
    const section = document.createElement('div');
    section.className = 'section' + (isOpen ? ' open' : '');
    section.dataset.key = key;
    section.innerHTML = buildSection(key, i + 1, data);
    container.appendChild(section);
    section.querySelector('.section-header').addEventListener('click', () => {
      section.classList.toggle('open');
    });
  });
}

function buildSection(key, num, data) {
  if (key === 'category') {
    const d = data.category;
    return `
      <div class="section-header">
        <span class="section-num">${String(num).padStart(2,'0')}</span>
        <span class="section-title">${d.label}</span>
        <span class="section-badge">${currentCategory}</span>
        <span class="section-arrow">▲</span>
      </div>
      <div class="section-body">
        <div class="cat-tabs">
          ${d.options.map(opt => `<button class="cat-tab ${opt===currentCategory?'active':''}" onclick="setCategory('${opt}')">${opt}</button>`).join('')}
        </div>
      </div>`;
  }

  if (key === 'message') {
    const d = data[`message_${currentCategory}`];
    return buildGroupSection(key, num, d.label, d.sub, d.groups);
  }

  if (key === 'object') {
    const d = data[`object_${currentCategory}`];
    return buildGroupSection(key, num, d.label, d.sub, d.groups, d.custom);
  }

  const d = data[key];
  if (!d) return '';
  return buildGroupSection(key, num, d.label, d.sub || '', d.groups, d.custom, d.badge);
}

function buildGroupSection(key, num, label, sub, groups, hasCustom, badge) {
  const sel = selections[key] || [];
  let groupsHtml = '';
  Object.entries(groups).forEach(([groupLabel, chips]) => {
    groupsHtml += `<div class="group">`;
    if (groupLabel) groupsHtml += `<div class="group-label">${groupLabel}</div>`;
    groupsHtml += `<div class="chips">`;
    chips.forEach(chip => {
      const isSelected = sel.includes(chip);
      groupsHtml += `<span class="chip ${isSelected ? 'selected' : ''}" onclick="toggleChip('${key}', '${chip.replace(/'/g, "\\'")}')">${chip}</span>`;
    });
    groupsHtml += `</div></div>`;
  });

  const customHtml = hasCustom ? `
    <div class="custom-input-row">
      <input class="custom-input" id="customInput_${key}" placeholder="목록에 없는 오브제 직접 입력">
      <button class="add-btn" onclick="addCustom('${key}')">추가</button>
    </div>` : '';

  return `
    <div class="section-header">
      <span class="section-num">${String(num).padStart(2,'0')}</span>
      <span class="section-title">${label}</span>
      ${sub ? `<span class="section-sub">${sub}</span>` : ''}
      ${badge ? `<span class="section-badge" style="margin-left:auto">${badge}</span>` : ''}
      <span class="section-arrow">▲</span>
    </div>
    <div class="section-body">
      ${groupsHtml}
      ${customHtml}
    </div>`;
}

// ─── INTERACTIONS ────────────────────────────────────────────────────────────

function switchTab(tab) {
  currentTab = tab;
  selections = {};
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', (i === 0 && tab === 'object') || (i === 1 && tab === 'scene'));
  });
  const titles = {
    object: ['블록을 고르면<br><em>문장이 완성됩니다.</em>', '항목을 클릭해 펼치고, 원하는 표현을 선택하세요. 오른쪽에 프롬프트가 실시간으로 조립됩니다.'],
    scene:  ['장면을 설계하면<br><em>상황이 완성됩니다.</em>', '야경에 미등기 건물만 빛나는 것처럼, 장면 전체로 메시지를 전달합니다.']
  };
  document.getElementById('panelTitle').innerHTML = titles[tab][0];
  document.getElementById('panelDesc').textContent = titles[tab][1];
  renderSections();
  buildPrompt();
}

function setCategory(cat) {
  currentCategory = cat;
  const msgSels = selections['message'] || [];
  const objSels = selections['object'] || [];
  selections['message'] = [];
  selections['object'] = [];
  renderSections();
  buildPrompt();
}

function toggleChip(key, value) {
  if (!selections[key]) selections[key] = [];
  const idx = selections[key].indexOf(value);
  if (idx >= 0) selections[key].splice(idx, 1);
  else selections[key].push(value);

  // Re-render just the chips for this section
  renderSections();
  buildPrompt();
}

function addCustom(key) {
  const input = document.getElementById(`customInput_${key}`);
  if (!input || !input.value.trim()) return;
  const val = input.value.trim();
  if (!selections[key]) selections[key] = [];
  if (!selections[key].includes(val)) selections[key].push(val);
  input.value = '';
  renderSections();
  buildPrompt();
}

function resetAll() {
  selections = {};
  renderSections();
  buildPrompt();
}

// ─── PROMPT BUILDING ─────────────────────────────────────────────────────────

function buildPrompt() {
  const parts = [];
  const cat = currentCategory;

  if (currentTab === 'object') {
    const order = ['message', 'object', 'shape', 'composition', 'light', 'surface', 'color', 'background'];
    const labels = {
      message: '전달 메시지', object: '오브제', shape: '형태', composition: '구도',
      light: '빛', surface: '표면', color: '색상', background: '배경'
    };
    order.forEach(key => {
      const sel = selections[key];
      if (sel && sel.length > 0) parts.push(sel.join(', '));
    });
    const excl = selections['exclude'];
    if (excl && excl.length > 0) parts.push(`제외: ${excl.join(', ')}`);
  } else {
    const order = ['message', 'background', 'keyElement', 'timeofday', 'lighting', 'colorMood', 'camera', 'mood'];
    order.forEach(key => {
      const sel = selections[key];
      if (sel && sel.length > 0) parts.push(sel.join(', '));
    });
    const excl = selections['exclude'];
    if (excl && excl.length > 0) parts.push(`제외: ${excl.join(', ')}`);
  }

  // Add direct input
  const direct = document.getElementById('directInput');
  if (direct && direct.value.trim()) parts.push(direct.value.trim());

  const output = document.getElementById('promptOutput');
  output.value = parts.join(' / ');
}

document.getElementById('directInput')?.addEventListener('input', buildPrompt);

// ─── SAVE / COPY / HISTORY ───────────────────────────────────────────────────

function copyPrompt() {
  const text = document.getElementById('promptOutput').value;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => showToast('복사되었습니다!'));
}

function savePrompt() {
  const text = document.getElementById('promptOutput').value;
  if (!text) return;
  const item = { text, tab: currentTab, cat: currentCategory, time: Date.now() };
  history.unshift(item);
  localStorage.setItem('promptHistory', JSON.stringify(history));
  renderHistory();
  showToast('저장되었습니다!');
}

function renderHistory() {
  const list = document.getElementById('historyList');
  if (!history.length) {
    list.innerHTML = '<div class="history-empty">저장된 프롬프트가 없습니다.</div>';
    return;
  }
  list.innerHTML = history.map((item, i) => `
    <div class="history-item" onclick="loadHistory(${i})">
      <div style="font-size:11px;color:var(--muted);margin-bottom:3px;">${item.tab === 'object' ? '오브제 그래픽' : '상황 묘사'} · ${item.cat} · ${new Date(item.time).toLocaleDateString('ko')}</div>
      <div class="history-item-text">${item.text}</div>
    </div>`).join('');
}

function loadHistory(i) {
  document.getElementById('promptOutput').value = history[i].text;
}

function exportHistory() {
  const blob = new Blob([JSON.stringify(history, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `8percent_prompts_${Date.now()}.json`; a.click();
}

function importHistory() {
  const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const imported = JSON.parse(ev.target.result);
        history = [...imported, ...history];
        localStorage.setItem('promptHistory', JSON.stringify(history));
        renderHistory(); showToast('가져왔습니다!');
      } catch { alert('올바른 JSON 파일을 선택해주세요.'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ─── INIT ────────────────────────────────────────────────────────────────────
renderSections();
renderHistory();
</script>
</body>
</html>
